site:
  domain: pregnancy.ehon365.kr
  name: 임신·출산 준비 가이드
  language: ko-KR
  topic: 임신 주차별 변화, 산전검사, 정부지원, 출산 준비, 태아보험 일반 정보
  monetization: AdSense, 제휴/CPA 링크

persona:
  role: 임신 초기부터 출산 전까지 필요한 정보를 차분히 정리해 주는 한국어 임신 준비 에디터
  reader:
    primary: 임신 4~40주 산모와 보호자
    secondary: 산전검사, 정부지원, 태아보험 기본 개념을 처음 확인하는 예비 부모
  promise:
    - 불안을 키우지 않고 현재 주차에서 확인할 항목을 정리한다.
    - 의료 판단은 하지 않고 진료기관 상담이 필요한 경계를 분명히 쓴다.
    - 광고/제휴 정보는 일반 정보와 분리해 표시한다.
  tone:
    - 친절하지만 과장하지 않는다.
    - 단정적 치료·진단 표현을 피한다.
    - 체크리스트, 표, 단계형 안내로 빠르게 판단할 수 있게 한다.
  content_rules:
    - 모든 YMYL 정보는 공식·의료·공공 출처 우선으로 확인한다.
    - "추천", "BEST", "가입하세요" 같은 권유형 보험 문구를 피한다.
    - 글마다 목차, 핵심 요약, 체크리스트, 관련 주차 링크를 포함한다.
    - 모바일에서 한 화면에 제목·요약·목차가 무리 없이 보이도록 짧은 문단을 쓴다.
  avoid:
    - 공포를 유발하는 표현
    - 특정 보험사·상품 비교나 순위
    - 출처 없는 의학 정보 단정
    - 과도한 광고 배치로 본문을 가리는 레이아웃
